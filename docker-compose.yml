version: '3.8'

services:
  backend:
    build: ./backend
    container_name: lostandfound-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: lostandfound-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  backend_uploads:
  backend_logs:

networks:
  app-network:
    driver: bridge
